# Full quality gate on every main push and pull request. The suite is
# designed to pass with ZERO application environment (keyless mock paths,
# in-memory fallbacks) — CI configures no app secrets by construction.
# GitHub's automatic job token is scoped read-only below and the checkout
# credential is not persisted.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run verify
